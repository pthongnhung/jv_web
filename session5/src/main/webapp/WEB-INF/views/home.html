<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #2c3e50;
        }
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        thead {
            background-color: #3498db;
            color: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: center;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #eaf2f8;
        }
    </style>
</head>
<body>
<h1>Xin chào Hồng Nhung</h1>
<div th:replace="layout :: header"></div>
<table>
    <thead>
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Stock</th>
        <th>Price</th>
        <th>Status</th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.price}"></td>
        <td th:text="${p.stock}"></td>
        <td th:text="${p.status ? 'hết hàng' : 'còn hàng'}"></td>
        <td>Xóa</td>
    </tr>
    </tbody>
</table>
</body>
</html>
