<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Danh sách món ăn</title>
</head>
<body>
<h2>Thực đơn nhà hàng</h2>

<!-- Hiển thị thông báo lỗi nếu có -->
<div th:if="${errorMessage != null}" style="color:red" th:text="${errorMessage}"></div>

<div th:if="${#lists.isEmpty(dishes)}">
    Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau
</div>

<!-- Nếu có dữ liệu -->
<table border="1" th:unless="${#lists.isEmpty(dishes)}">
    <tr>
        <th>ID</th>
        <th>Tên món</th>
        <th>Giá</th>
        <th>Trạng thái</th>
        <th>Hành động</th>
    </tr>
    <tr th:each="dish : ${dishes}">
        <td th:text="${dish.id}"></td>
        <td th:text="${dish.name}"></td>
        <td th:text="${dish.price}"></td>
        <td th:if="${dish.available}" th:text="'Còn hàng'"></td>
        <td th:unless="${dish.available}" th:text="'Hết hàng'" style="color:red"></td>
        <td>
            <!-- Nút chỉnh sửa -->
            <a th:href="@{|/lesson2/edit/${dish.id}|}">Chỉnh sửa</a>
        </td>
    </tr>
</table>
</body>
</html>
