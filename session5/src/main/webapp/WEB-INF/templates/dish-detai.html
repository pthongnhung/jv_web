<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Chi tiết món ăn</title>
</head>
<body>
<section layout:fragment="content">
    <h2>Chi tiết món ăn</h2>
    <p><strong>ID:</strong> <span th:text="${dish.id}"></span></p>
    <p><strong>Tên món:</strong> <span th:text="${dish.name}"></span></p>
    <p><strong>Giá:</strong> <span th:text="${dish.price}"></span></p>
    <p><strong>Trạng thái:</strong>
        <span th:if="${dish.available}" th:text="'Còn hàng'"></span>
        <span th:unless="${dish.available}" th:text="'Hết hàng'"></span>
    </p>
</section>
</body>
</html>
