<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Chỉnh sửa món ăn</title>
</head>
<body>
<section layout:fragment="content">
    <h2>Chỉnh sửa món ăn</h2>

    <form th:action="@{|/lesson2/edit/${dish.id}|}" method="post">
        <input type="hidden" name="id" th:value="${dish.id}"/>

        <p>
            Tên món:
            <input type="text" name="name" th:value="${dish.name}" required/>
        </p>

        <p>
            Giá:
            <input type="number" name="price" th:value="${dish.price}" required/>
        </p>

        <p>
            Còn hàng:
            <input type="checkbox" name="available"
                   th:checked="${dish.available}"/>
        </p>

        <button type="submit">Cập nhật</button>
    </form>
</section>
</body>
</html>
